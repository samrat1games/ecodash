<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-test.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --border: #262626;
            --gray: #666666;
            --dot: #ff4500;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-transform: uppercase;
        }

        .container {
            width: 90%;
            max-width: 650px;
            border: 1px solid var(--border);
            padding: 50px 40px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--gray);
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .dot {
            height: 6px;
            width: 6px;
            background-color: var(--dot);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }

        select {
            background: transparent;
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 5px 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            cursor: pointer;
            outline: none;
        }

        #question {
            font-size: 1.8rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .opt {
            border: 1px solid var(--border);
            padding: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.1s;
        }

        .opt:hover { border-color: #555; }
        .opt.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }

        .btn-confirm {
            width: 100%;
            margin-top: 40px;
            padding: 22px;
            background: transparent;
            border: 1px solid var(--fg);
            color: var(--fg);
            font-weight: 900;
            cursor: pointer;
            letter-spacing: 4px;
        }

        .btn-confirm:disabled { border-color: var(--border); color: var(--gray); cursor: not-allowed; }

        #result { display: none; text-align: left; }
        .score { font-size: 8rem; font-weight: 900; margin: 20px 0; letter-spacing: -5px; }
        
        .footer { margin-top: 40px; font-size: 0.6rem; color: #222; letter-spacing: 2px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="quiz-ui">
    <div class="status-bar">
        <div><span class="dot"></span><span id="step-count">STEP 01/20</span></div>
        <select id="lang" onchange="updateLang()">
            <option value="ru">RU</option>
            <option value="en">EN</option>
            <option value="zh">ZH</option>
            <option value="ja">JA</option>
            <option value="uk">UK</option>
            <option value="be">BE</option>
            <option value="kk">KK</option>
            <option value="tr">TR</option>
        </select>
    </div>
    <div id="question">LOADING DATA...</div>
    <div class="options" id="options"></div>
    <button class="btn-confirm" id="next-btn" onclick="next()" disabled>CONFIRM</button>
</div>

<div class="container" id="result">
    <div class="status-bar">FINAL REPORT</div>
    <div class="score" id="final-score">00</div>
    <div id="verdict" style="text-transform: none; color: #666; margin-bottom: 40px;">...</div>
    <button class="btn-confirm" onclick="location.reload()">RESTART</button>
</div>

let currentLang = 'ru';
let currentIndex = 0;
let score = 0;
let selected = null;

const i18n = {
    ru: { next: "ПОДТВЕРДИТЬ", step: "ШАГ", res: "РЕЗУЛЬТАТ" },
    en: { next: "CONFIRM", step: "STEP", res: "REPORT" },
    zh: { next: "确认", step: "步骤", res: "报告" },
    ja: { next: "確認", step: "ステップ", res: "報告" },
    uk: { next: "ПІДТВЕРДИТИ", step: "КРОК", res: "ЗВІТ" },
    be: { next: "ПАДЦВЕРДЗІЦЬ", step: "КРОК", res: "СПРАВАЗДАЧА" },
    kk: { next: "РАСТАУ", step: "ҚАДАМ", res: "ЕСЕП" },
    tr: { next: "ONAYLA", step: "ADIM", res: "RAPOR" }
};

function updateLang() {
    currentLang = document.getElementById('lang').value;
    render();
}

function render() {
    selected = null;
    document.getElementById('next-btn').disabled = true;
    document.getElementById('next-btn').innerText = i18n[currentLang].next;
    
    const q = DB[currentIndex];
    document.getElementById('step-count').innerText = `${i18n[currentLang].step} ${String(currentIndex+1).padStart(2, '0')}/20`;
    document.getElementById('question').innerText = q.q[currentLang];
    
    const box = document.getElementById('options');
    box.innerHTML = '';
    
    q.a[currentLang].forEach((text, i) => {
        const div = document.createElement('div');
        div.className = 'opt';
        div.innerText = text;
        div.onclick = () => {
            document.querySelectorAll('.opt').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            selected = i;
            document.getElementById('next-btn').disabled = false;
        };
        box.appendChild(div);
    });
}

function next() {
    if (selected === DB[currentIndex].c) score++;
    currentIndex++;
    if (currentIndex < 20) render();
    else finish();
}

function finish() {
    document.getElementById('quiz-ui').classList.add('hidden');
    document.getElementById('result').style.display = 'block';
    document.getElementById('final-score').innerText = String(score).padStart(2, '0');
    
    const msg = score > 15 ? "EXPERT DETECTED. SYSTEM STABLE." : "RE-EDUCATION REQUIRED.";
    document.getElementById('verdict').innerText = msg;
}

render();
</script>
