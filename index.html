<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoDash</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --btn-bg: #ffffff;
            --btn-hover: #f0f0f0;
            --border: #000000;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --text: #ffffff;
            --btn-bg: #1e1e1e;
            --btn-hover: #333333;
            --border: #444444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        select, .theme-toggle {
            padding: 8px;
            border-radius: 4px;
            background: var(--btn-bg);
            color: var(--text);
            border: 1px solid var(--border);
            cursor: pointer;
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 300;
            font-size: 3rem;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 800px;
            width: 90%;
        }

        button {
            width: 100%;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 16px;
            background: var(--btn-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--btn-hover);
        }

        a {
            text-decoration: none;
        }

        footer {
            margin-top: 50px;
            font-size: 14px;
            text-align: center;
            opacity: 0.8;
        }

        footer a {
            color: var(--text);
            font-weight: bold;
        }
    </style>
</head>
<body data-theme="light">

    <div class="controls">
        <select id="langSelect" onchange="changeLang(this.value)">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="kz">Қазақша</option>
            <option value="zh">中文</option>
            <option value="es">Español</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="it">Italiano</option>
            <option value="ja">日本語</option>
            <option value="tr">Türkçe</option>
        </select>
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    </div>

    <h1 id="title">EcoDash</h1>

    <div class="buttons">
        <a href="calc.html"><button id="btn-calc">Калькулятор углерода</button></a>
        <a href="vpnsite/vpn.html"><button id="btn-vpn">FRKN.vpn</button></a>
        <a href="tube/index.html"><button id="btn-tube">FRKN.tube</button></a>
        <a href="trecker/index.html"><button id="btn-track">Трекер углеродного следа</button></a>
        <a href="recycling/index.html"><button id="btn-recycle">Справочник по сортировке</button></a>
        <a href="timer/index.html"><button id="btn-timer">Эко-таймер</button></a>
        <a href="shop/index.html"><button id="btn-shop">Эко-Магазин</button></a>
        <a href="ecochelendg/index.html"><button id="btn-challenge">Эко-челлендж</button></a>
        <a href="questions/index.html"><button id="btn-questions">Eco-test</button></a>
        <a href="wikieco/index.html"><button id="btn-wiki">Вики-Эко</button></a>
        <a href="EcoSuperGame/index.html"><button id="btn-game">Игра</button></a>
    </div>

        <p id="footer-text">Проект создал <a href="https://github.com/samrat1games/" target="_blank">samrat</a> | Перевод сделал Gemini</p>

        };

        function changeLang(lang) {
            const t = translations[lang];
            document.getElementById('btn-calc').innerText = t.calc;
            document.getElementById('btn-vpn').innerText = t.vpn;
            document.getElementById('btn-tube').innerText = t.tube;
            document.getElementById('btn-track').innerText = t.track;
            document.getElementById('btn-recycle').innerText = t.recycle;
            document.getElementById('btn-timer').innerText = t.timer;
            document.getElementById('btn-shop').innerText = t.shop;
            document.getElementById('btn-challenge').innerText = t.challenge;
            document.getElementById('btn-questions').innerText = t.questions;
            document.getElementById('btn-wiki').innerText = t.wiki;
            document.getElementById('btn-game').innerText = t.game;
            document.getElementById('footer-text').innerHTML = t.footer;
            localStorage.setItem('lang', lang);
        }

        function toggleTheme() {
            const body = document.body;
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const savedLang = localStorage.getItem('lang') || 'ru';
            
            document.body.setAttribute('data-theme', savedTheme);
            document.getElementById('langSelect').value = savedLang;
            changeLang(savedLang);
        };
    </script>
</body>
</html>
