<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Protocol / 30 Challenges</title>
    <style>
        :root { --black: #000; --white: #fff; --gray: #eee; }
        * { box-sizing: border-box; }
        body { background: var(--white); color: var(--black); font-family: "Inter", sans-serif; margin: 0; padding: 40px 20px; }
        .container { max-width: 650px; margin: 0 auto; }
        
        .lang-nav {
            display: flex; overflow-x: auto; gap: 12px; padding-bottom: 15px; margin-bottom: 30px;
            border-bottom: 1px solid var(--black); scrollbar-width: none;
        }
        .lang-nav::-webkit-scrollbar { display: none; }
        .l-btn { background: none; border: none; cursor: pointer; font-size: 11px; text-transform: uppercase; color: #999; }
        .l-btn.active { color: var(--black); font-weight: bold; }

        .list { border-top: 1px solid var(--black); }
        .item { border-bottom: 1px solid var(--gray); padding: 18px 0; cursor: pointer; }
        .item-header { display: flex; justify-content: space-between; align-items: center; }
        .item-name { font-size: 16px; font-weight: 500; display: flex; align-items: center; }
        
        .status-dot {
            width: 16px; height: 16px; border: 1px solid var(--black);
            margin-right: 15px; cursor: pointer; flex-shrink: 0; transition: 0.2s;
        }
        .item.completed .status-dot { background: var(--black); position: relative; }
        .item.completed .status-dot::after { content: '✓'; color: white; font-size: 10px; position: absolute; left: 2px; top: -1px; }
        .item.completed .item-name { text-decoration: line-through; color: #aaa; }

        .item-details { max-height: 0; overflow: hidden; transition: 0.3s; font-size: 13px; color: #666; }
        .item.open .item-details { max-height: 100px; margin-top: 10px; }
        
        .counter { font-size: 12px; text-transform: uppercase; margin-bottom: 10px; color: #666; }
        footer { margin-top: 60px; font-size: 10px; text-transform: uppercase; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-nav" id="langNav"></div>
    <div class="counter" id="progressCounter">DONE: 0 / 30</div>
    <div class="list" id="challengeList"></div>

];

const langs = ["en", "ru", "de", "fr", "es", "it", "zh", "jp", "kz", "tr"];
let curL = localStorage.getItem('eco_lang_idx') || 1;
let states = JSON.parse(localStorage.getItem('eco_v2')) || {};

function init() {
    const nav = document.getElementById('langNav');
    langs.forEach((l, i) => {
        const b = document.createElement('button');
        b.className = `l-btn ${i == curL ? 'active' : ''}`;
        b.innerText = l.toUpperCase();
        b.onclick = () => { curL = i; localStorage.setItem('eco_lang_idx', i); render(); };
        nav.appendChild(b);
    });
    render();
}

function toggle(id) {
    states[id] = !states[id];
    localStorage.setItem('eco_v2', JSON.stringify(states));
    render();
}

function render() {
    const list = document.getElementById('challengeList');
    list.innerHTML = '';
    let done = 0;

    rawData.forEach((item, id) => {
        const div = document.createElement('div');
        const isDone = states[id];
        if(isDone) done++;
        div.className = `item ${isDone ? 'completed' : ''}`;
        div.onclick = (e) => { if(e.target.className !== 'status-dot') div.classList.toggle('open') };
        div.innerHTML = `
            <div class="item-header">
                <span class="item-name"><div class="status-dot" onclick="toggle(${id}); event.stopPropagation();"></div>${item[curL]}</span>
            </div>
            <div class="item-details">Task ID: 0${id+1} / Priority: Stable. Complete to log impact.</div>
        `;
        list.appendChild(div);
    });

    document.querySelectorAll('.l-btn').forEach((b, i) => b.classList.toggle('active', i == curL));
    document.getElementById('progressCounter').innerText = `DONE: ${done} / 30`;
}

init();
</script>
</body>
</html>
